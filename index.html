  <style>
    * {

    .modal-title {

    .input-group {

      display: flex;
      gap: 1rem;
      justify-content: center;

    }

    .modal-btn {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.15rem;
      text-transform: uppercase;
      padding: 0.7rem 1.8rem;
      border-radius: 12px;

    .modal-btn.primary {

    @media (max-width: 480px) {

      .modal {

      }
      .amount-input {
        width: 140px;
        font-size: 2rem;
      }
      .chart-bars {
        gap: 0.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="chart-container">
      <div class="chart-header">

      </svg>

    </div>

    <div class="countdown-row">
      <span class="countdown-text">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 4h14v3l-6 5 6 5v3H5v-3l6-5-6-5V4z" />
          <line x1="12" y1="9" x2="12" y2="15" stroke-width="1.8" />

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">week 1 earnings</div>
      <div class="week-indicator" id="weekIndicator">pay period starting jul 2</div>
      
      <div class="input-group">
        <span class="currency-symbol">£</span>

      </div>

        <button class="modal-btn" id="skipBtn">skip</button>

  <script>
    (function() {
      const PREVIOUS_PAYDAY = new Date(2026, 5, 5); // June 5, 2026
      const INTERVAL_DAYS = 28;
      const STORAGE_KEY = 'payday_earnings_v3';
      
      const paydayDisplayEl = document.getElementById('paydayDisplay');
      const daysLeftEl = document.getElementById('daysLeft');
      const daysLabelEl = document.getElementById('daysLabel');
      
      const modalOverlay = document.getElementById('modalOverlay');
      const modalTitle = document.getElementById('modalTitle');
      const weekIndicator = document.getElementById('weekIndicator');
      const amountInput = document.getElementById('amountInput');
      const nextBtn = document.getElementById('nextBtn');
      const skipBtn = document.getElementById('skipBtn');
      const summaryText = document.getElementById('summaryText');
      const openTrackerBtn = document.getElementById('openTrackerBtn');
      const resetChartBtn = document.getElementById('resetChartBtn');
      
      const bar1 = document.getElementById('bar1');
      const bar2 = document.getElementById('bar2');
      const bar3 = document.getElementById('bar3');
      const bar4 = document.getElementById('bar4');
      const barVal1 = document.getElementById('barVal1');
      const barVal2 = document.getElementById('barVal2');
      const barVal3 = document.getElementById('barVal3');
      const barVal4 = document.getElementById('barVal4');
      const chartTotal = document.getElementById('chartTotal');
      
      let currentWeek = 1;
      let weeklyEarnings = [0, 0, 0, 0];
      let currentPeriodStart = null;
      let currentPeriodKey = null;
      
      function formatDateString(date) {
        return date.toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        }).toUpperCase();
      }
      
      function formatShortDate(date) {
        return date.toLocaleDateString('en-US', {
          month: 'short',
          day: 'numeric'
        }).toUpperCase();
      }
      
      function getSundayBefore(date) {
        const result = new Date(date);
        const day = result.getDay();
        if (day !== 0) {
          result.setDate(result.getDate() - day);
        }
        return result;
      }
      
      function getMondayAfter(date) {
        const result = new Date(date);
        const day = result.getDay();
        const daysToMonday = day === 0 ? 1 : 8 - day;
        result.setDate(result.getDate() + daysToMonday);
        return result;
      }
      
      function getCurrentPaydayWindow(today) {
        const todayTime = today.getTime();
        let payday = new Date(PREVIOUS_PAYDAY);
        
        while (payday.getTime() <= todayTime) {
          payday = new Date(payday);
          payday.setDate(payday.getDate() + INTERVAL_DAYS);
        }
        
        const nextPayday = new Date(payday);
        const previousPayday = new Date(payday);
        previousPayday.setDate(previousPayday.getDate() - INTERVAL_DAYS);
        
        const previousCutoff = getSundayBefore(previousPayday);
        const periodStart = getMondayAfter(previousCutoff);
        
        const isTodayPayday = nextPayday.toDateString() === today.toDateString();
        
        return { 
          currentPayday: nextPayday, 
          isTodayPayday,
          periodStart: periodStart
        };
      }
      
      function getPeriodKey(periodStart) {
        return periodStart.toISOString().split('T')[0];
      }
      
      function saveEarningsData() {
        if (!currentPeriodKey) return;
        try {
          const allData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
          allData[currentPeriodKey] = {
            earnings: [...weeklyEarnings],
            savedAt: new Date().toISOString()
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
        } catch (e) {
          console.warn('Could not save earnings data');
        }
      }
      
      function loadEarningsData(periodKey) {
        try {
          const allData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
          if (allData[periodKey] && allData[periodKey].earnings) {
            return [...allData[periodKey].earnings];
          }
        } catch (e) {
          console.warn('Could not load earnings data');
        }
        return [0, 0, 0, 0];
      }
      
      function resetEarningsData() {
        weeklyEarnings = [0, 0, 0, 0];
        if (currentPeriodKey) {
          try {
            const allData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            delete allData[currentPeriodKey];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
          } catch (e) {
            console.warn('Could not reset earnings data');
          }
        }
        updateChart();
      }
      
      function updateChart() {
        const earnings = weeklyEarnings;
        const maxVal = Math.max(...earnings, 1);
        const barHeight = 100;
        
        const bars = [bar1, bar2, bar3, bar4];
        const barVals = [barVal1, barVal2, barVal3, barVal4];
        
        earnings.forEach((val, i) => {
          const heightPercent = (val / maxVal) * barHeight;
          bars[i].style.height = Math.max(val > 0 ? heightPercent : 2, 2) + 'px';
          
          if (val > 0) {
            bars[i].classList.remove('zero');
          } else {
            bars[i].classList.add('zero');
          }
          
          barVals[i].textContent = '£' + val.toFixed(0);
        });
        
        const total = earnings.reduce((sum, val) => sum + val, 0);
        chartTotal.textContent = '£' + total.toFixed(2);
      }
      
      function getWeekDates(periodStart, weekNumber) {
        const weekStart = new Date(periodStart);
        weekStart.setDate(weekStart.getDate() + (weekNumber - 1) * 7);
        
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekEnd.getDate() + 6);
        
        return { weekStart, weekEnd };
      }
      
      function handleNextClick() {
        const value = parseFloat(amountInput.value);
        if (!isNaN(value) && value >= 0) {
          weeklyEarnings[currentWeek - 1] = value;
        }
        
        saveEarningsData();
        updateChart();
        
        if (currentWeek < 4) {
          currentWeek++;
          updateModalUI();
          amountInput.focus();
        } else {
          showSummary();
        }
      }
      
      function handleSkipClick() {
        if (currentWeek < 4) {
          currentWeek++;
          updateModalUI();
          amountInput.focus();
        } else {
          showSummary();
        }
      }
      
      function showSummary() {
        const total = weeklyEarnings.reduce((sum, val) => sum + val, 0);
        const average = total / 4;
        
        summaryText.innerHTML = `
          💰 total earnings: <strong>£${total.toFixed(2)}</strong><br>
          📊 weekly average: <strong>£${average.toFixed(2)}</strong>
        `;
        
        modalTitle.textContent = 'pay period complete';
        weekIndicator.textContent = 'all 4 weeks recorded';
        amountInput.style.display = 'none';
        document.querySelector('.currency-symbol').style.display = 'none';
        nextBtn.textContent = 'close';
        skipBtn.style.display = 'none';
        
        nextBtn.onclick = closeTracker;
      }
      
      function updateModalUI() {
        modalTitle.textContent = `week ${currentWeek} earnings`;
        
        const { weekStart, weekEnd } = getWeekDates(currentPeriodStart, currentWeek);
        weekIndicator.textContent = `${formatShortDate(weekStart)} – ${formatShortDate(weekEnd)}`;
        
        if (currentWeek === 4) {
          nextBtn.textContent = 'finish ✓';
        } else {
          nextBtn.textContent = 'next week →';
        }
        
        amountInput.value = weeklyEarnings[currentWeek - 1] > 0 ? weeklyEarnings[currentWeek - 1] : '';
        
        nextBtn.onclick = handleNextClick;
        skipBtn.onclick = handleSkipClick;
      }
      
      function openTracker() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const { periodStart } = getCurrentPaydayWindow(today);
        currentPeriodStart = new Date(periodStart);
        currentPeriodKey = getPeriodKey(currentPeriodStart);
        
        weeklyEarnings = loadEarningsData(currentPeriodKey);
        currentWeek = 1;
        
        amountInput.style.display = '';
        document.querySelector('.currency-symbol').style.display = '';
        skipBtn.style.display = '';
        summaryText.textContent = '';
        
        updateChart();
        updateModalUI();
        modalOverlay.classList.add('active');
        setTimeout(() => amountInput.focus(), 100);
      }
      
      function closeTracker() {
        modalOverlay.classList.remove('active');
        saveEarningsData();
        updateChart();
      }
      
      function updatePaydayInfo() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const { currentPayday, isTodayPayday, periodStart } = getCurrentPaydayWindow(today);
        
        paydayDisplayEl.textContent = formatDateString(currentPayday);
        
        const todayTime = today.getTime();
        const paydayTime = currentPayday.getTime();
        let daysRemaining = 0;
        if (paydayTime >= todayTime) {
          daysRemaining = Math.ceil((paydayTime - todayTime) / (1000 * 60 * 60 * 24));
        }
        if (isTodayPayday) daysRemaining = 0;
        
        daysLeftEl.textContent = daysRemaining;
        daysLabelEl.textContent = daysRemaining === 1 ? 'day' : 'days';
        
        const periodKey = getPeriodKey(periodStart);
        weeklyEarnings = loadEarningsData(periodKey);
        updateChart();
      }
      
      openTrackerBtn.addEventListener('click', openTracker);
      resetChartBtn.addEventListener('click', resetEarningsData);
      
      nextBtn.onclick = handleNextClick;
      skipBtn.onclick = handleSkipClick;
      
      modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) {
          closeTracker();
        }
      });
      
      amountInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          handleNextClick();
        }
      });
      
      updatePaydayInfo();
      setInterval(updatePaydayInfo, 60000);
      
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') updatePaydayInfo();
      });
      window.addEventListener('focus', updatePaydayInfo);
    })();
  </script>
</body>
</html>
